<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de factorial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card p-4">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4 fw-bold ">Factorial JS</h2>
                        <p class="text-center mb-4">Ingresa un número entero positivo para obtener su factorial.</p>
                        
                        <div class="mb-3">
                            <label for="numberInput" class="form-label fw-semibold">Número:</label>
                            <input 
                                type="number" 
                                id="numberInput" 
                                class="form-control form-control-lg" 
                                placeholder="Ej: 5"
                                autocomplete="off"
                            >
                            <div id="errorMessage" class="invalid-feedback">
                                Error: Por favor, ingresa un número entero positivo válido.
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg" onclick="entrada()">
                                Calcular Factorial
                            </button>
                        </div>

                        <div id="resultContainer" class="mt-4 p-3 bg-light border rounded">
                            <h6 class="text-uppercase text-secondary small fw-bold">Resultado:</h6>
                            <p id="resultText" class="h3 mb-0 text-dark text-center"></p>
                        </div>
                    </div>
                    <div class="text-center">
                        Lógica de Programación 3
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
